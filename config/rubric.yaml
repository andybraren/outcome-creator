rubric:
  name: "Outcome Quality Rubric"
  version: "1.0"
  max_score: 8
  pass_threshold: 8
  revise_threshold: 6
  dimensions:
    measurability:
      weight: 1
      max: 2
      description: "Does each User Journey phase have an observable success signal with timeframe (leading in early phases, lagging where appropriate)?"
      levels:
        0:
          label: "Missing"
          criteria:
            - "No metrics or directional indicators anywhere in the document"
            - "Acceptance signals are purely aspirational"
            - "Business and product outcomes have no quantitative or qualitative measures"
          examples:
            - "Users will be happier"
            - "The product will be better"
        1:
          label: "Partial"
          criteria:
            - "Directional indicators present but metrics are vague"
            - "Metrics exist but aren't clearly tied to the stated outcome"
            - "Only one layer (business OR product) has clear metrics"
            - "Acceptance signals exist but aren't observable or time-bound"
          examples:
            - "Increase engagement (no specific metric)"
            - "Reduce time-to-value (no baseline or target)"
        2:
          label: "Complete"
          criteria:
            - "Business outcome has specific metrics or clear directional indicators"
            - "Product outcome has specific, measurable behavioral changes"
            - "Each User Journey phase has an observable success signal with timeframe"
            - "Early phases carry leading indicators; final phase(s) include outcome-level lagging targets"
            - "No redundant restatement of the same metric across phases"
          examples:
            - "Four phases: leading signals at 6/9 months; ≥3 strategic accounts in production by 12 months in Phase 4 success signal"
            - "Phase success signals are specific, time-bound, and observable"

    user_focus:
      weight: 1
      max: 2
      description: "Is the JTBD clear, and does the User Journey describe the full journey with scenarios?"
      levels:
        0:
          label: "Missing"
          criteria:
            - "No clear user need articulated"
            - "Outcome is technology-driven or internally focused"
            - "No persona or user segment identified"
            - "User outcome section missing or reads like a feature spec"
          examples:
            - "Implement observability stack"
            - "Add dashboard features"
        1:
          label: "Partial"
          criteria:
            - "User need stated but generic"
            - "Persona is vague without further specificity"
            - "User outcome describes a feature rather than capability change"
            - "Evidence for user need is thin or absent"
          examples:
            - "Users want better monitoring tools"
            - "Enterprises need more flexibility"
        2:
          label: "Complete"
          criteria:
            - "Specific user persona or segment identified with context"
            - "User outcome describes meaningful change in capability or experience"
            - "Grounded in research, customer feedback, or evidence"
            - "Solution-agnostic — multiple features could serve it"
            - "A user would recognize this as their problem"
            - "User Journey & Phases with 2–4 phases and capability statements per actor"
            - "2–3 scenarios (Actors, Context, Flow, Win moment) tied to phases; no duplicated pain/quotes"
          examples:
            - "AI engineers can diagnose agent failures in under 5 minutes without needing cluster access or ops team assistance"
            - "Platform engineers can see fleet-wide agent health at a glance during incident response"

    business_alignment:
      weight: 1
      max: 2
      description: "Does the outcome connect to strategic goals with clear business value?"
      levels:
        0:
          label: "Missing"
          criteria:
            - "No connection to any strategic goal"
            - "Business value is absent or hand-wavy"
            - "Could apply to any product, not specifically this one"
          examples:
            - "Make the product better"
            - "Improve customer satisfaction"
        1:
          label: "Partial"
          criteria:
            - "Strategic goal referenced but connection is loose"
            - "Business outcome plausible but not substantiated"
            - "Business metric too broad without specifics"
          examples:
            - "Supports our AI strategy (no further detail)"
            - "Will increase revenue (no mechanism described)"
        2:
          label: "Complete"
          criteria:
            - "Direct connection to strategic goals with clear rationale"
            - "Business outcome has specific metrics or directional indicators"
            - "Evidence supports the business case"
            - "Business outcome is clearly a lagging indicator of product outcome"
          examples:
            - "Directly supports PROJGOALS-314 (Bring Your Own Agent) by reducing time-to-production for customer agent deployments by 50%"
            - "Addresses the 81% of enterprises citing observability gaps as a blocker to production agent deployment (IDC 2026)"

    actionability:
      weight: 1
      max: 2
      description: "Can teams derive concrete work from this outcome? Are release milestones user-capability statements?"
      levels:
        0:
          label: "Missing"
          criteria:
            - "Too broad — could mean anything"
            - "Or too narrow — really just a feature request"
            - "No downstream opportunities or release milestones identified"
            - "Teams cannot derive concrete work"
          examples:
            - "Improve the platform"
            - "Add a button to export traces"
        1:
          label: "Partial"
          criteria:
            - "Scope reasonable but downstream opportunities unclear"
            - "Milestones exist but are solution-shaped, theme-only, or lack sequencing"
            - "Phases bundle unrelated problems without delivery-coupling rationale"
            - "Out-of-scope statement missing or vague"
            - "Teams would need significant additional context"
            - "Open questions not identified"
          examples:
            - "Users need better agent management (no specifics on where to start)"
            - "Milestones describe architecture components instead of customer capabilities"
            - "Out of scope says 'performance optimization' without naming what's excluded"
        2:
          label: "Complete"
          criteria:
            - "Well-scoped — not too broad, not too narrow"
            - "User Journey phases are user-capability statements that pass the three-solutions test"
            - "Milestones are gap-driven (bottom-up), not theme buckets with unrelated problems bundled"
            - "Phases have a proposed sequence with value dependencies noted"
            - "Each phase has a success signal (observable customer value)"
            - "Out-of-scope statement names 3+ related exclusions with brief rationale"
            - "Open Questions identifies discovery questions per capability area"
            - "Related Resources links to implementation sketch, design, and/or evidence docs"
            - "Teams can begin discovery immediately"
            - "Open questions are identified and contextualized"
            - "Related RFEs cross-referenced where relevant"
          examples:
            - "Outcome with 3 user-capability milestones, value dependencies noted, success signals per milestone, 4 named exclusions with rationale, and concrete downstream opportunities"

  verdicts:
    PASS:
      threshold: 8
      description: "Outcome is ready for downstream work"
      action: "Proceed to RFE creation and strategy planning"
    REVISE:
      threshold: 6
      description: "Targeted improvements needed"
      action: "Address specific dimension feedback and re-score"
      condition: "No dimension may be 0"
    REWORK:
      threshold: 0
      description: "Fundamental issues"
      action: "Significant rethinking required before proceeding"

  anti_patterns:
    - name: "Output disguised as outcome"
      description: "The 'outcome' is really a feature or deliverable"
      test: "Ask: 'Is this a yes/no deliverable or a measurable change?'"
    - name: "Vanity metric"
      description: "The metric sounds good but doesn't reflect real user value"
      test: "Ask: 'Could we game this metric without helping users?'"
    - name: "Kitchen sink"
      description: "Too many unrelated goals or features crammed into one outcome — no shared journey bridge"
      test: "Ask: 'Do these serve one experience journey, or should this be sibling outcomes? Could one team own this?'"
    - name: "Feature in disguise"
      description: "Narrow enough that only one solution could serve it"
      test: "Ask: 'Can we imagine 3 different ways to achieve this?'"
    - name: "Sentiment without behavior"
      description: "Only measures how people feel, not what they do"
      test: "Ask: 'What would we see change in the product if this succeeded?'"
