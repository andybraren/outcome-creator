# Milestone plan for <OUTCOME-ID> — generated by /outcome.plan-milestones
# Methodology: docs/outcome-milestone-planning.md

outcome_id: OUTCOME-NNN
title: ""
status: draft  # draft | applied
created: YYYY-MM-DD
updated: YYYY-MM-DD

# Bottom-up inventory — do not start from theme names
atomic_capabilities:
  - id: cap-1
    summary: "One-sentence customer gap (problem-space)"
    source: problem-statement | evidence | existing-phase
    job_thread: primary  # primary | unrelated → triggers outcome.split
    delivery_coupled_with: []  # ids that must ship with this cap

# 2–3 strategies considered; one recommended
grouping_strategies:
  - name: strategy-a
    milestone_count: 3
    rationale: ""
    recommended: true
  - name: strategy-b
    milestone_count: 4
    rationale: ""
    recommended: false

# Recommended milestones → map to ### Phase N in User Journey
milestones:
  - phase: 1
    name: PhaseName
    capability_headline: "User capability — three-solutions test"
    atomic_capability_ids: [cap-1, cap-2]
    problems_addressed:
      - "Problem bullet"
    features_to_deliver:
      - key: PROJ-123
        summary: "Story / Feature / RFE summary"
    depends_on: []  # prior phase numbers
    sequencing_notes:
      - "Value dependency explanation"
    success_signal_sketch: "Observable signal (target: timeframe)"
    sizing:
      one_sentence_test: pass  # pass | fail
      three_solutions_test: pass
      job_thread_coherent: true
      expected_rfe_count: "1"  # "1" | "1..N" | "2+" — forecast for rfe-creator handoff

rejected_groupings:
  - reason: theme-only
    description: "Why grouping by Trust/Operate without gap analysis was rejected"

apply_notes: ""
