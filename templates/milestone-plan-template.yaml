# Milestone plan for <OUTCOME-ID> — generated by /outcome.plan-milestones
# Methodology: docs/outcome-milestone-planning.md
# Enforce exactly two buckets: Next (near-term) and Future (later). No additional phases.

outcome_id: OUTCOME-NNN
title: ""
status: draft  # draft | applied
created: YYYY-MM-DD
updated: YYYY-MM-DD

# Bottom-up inventory — do not start from theme names
atomic_capabilities:
  - id: cap-1
    summary: "One-sentence customer gap (problem-space)"
    source: problem-statement | evidence | existing-journey
    job_thread: primary  # primary | unrelated → triggers outcome.split
    delivery_coupled_with: []  # ids that must ship with this cap
    bucket: next  # next | future — which User Journey subsection owns this cap

# Optional: alternate groupings considered; recommended always maps to next + future
grouping_strategies:
  - name: strategy-a
    rationale: ""
    recommended: true
  - name: strategy-b
    rationale: ""
    recommended: false

# Exactly two milestones — map to ### Next and ### Future in User Journey
milestones:
  - bucket: next
    name: Next
    problems_addressed:
      - "Problem bullet"
    personas_helped:
      - actor: "Role"
        change: "Capability / experience change"
    features_to_deliver:
      - key: PROJ-123
        summary: "Story / Feature / RFE summary"
        rank: P1  # P1, P2, P3… — importance to unlock Next; written as (P1) prefix in outcome body
    sequencing_notes:
      - "Value dependency explanation"
    success_signal_sketch: "Observable signal (target: timeframe)"
    sizing:
      one_sentence_test: pass  # pass | fail
      three_solutions_test: pass
      job_thread_coherent: true
      expected_rfe_count: "1"  # "1" | "1..N" | "2+" — forecast for rfe-creator handoff

  - bucket: future
    name: Future
    # Future is features-only in the outcome body — no personas, success signal, or scenarios
    features_to_deliver:
      - key: PROJ-456
        summary: "Story / Feature / RFE summary"

rejected_groupings:
  - reason: multi-phase-arc
    description: "Why more than Next + Future (e.g. Trust/Operate/Observe theme phases) was rejected"

apply_notes: ""
